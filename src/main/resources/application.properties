spring.application.name=salesSavvy

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/salessavvydb
spring.datasource.username=root
spring.datasource.password=mysql1234_

spring.jpa.hibernate.ddl-auto=update
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

jwt.secret=your-very-long-secure-secret-key-for-products-1234567891234567890
jwt.expiration=3600000

spring.web.cors.exposed-headers=*
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true
